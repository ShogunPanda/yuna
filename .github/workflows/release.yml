name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version number to tag and release"
        required: true
        type: string
      prerelease:
        description: "Release as pre-release"
        required: false
        type: boolean
        default: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact: yuna-linux
            path: target/release/yuna
          - name: Windows
            os: windows-latest
            artifact: yuna-windows
            path: target/release/yuna-windows.exe
          - name: MacOS (Apple Silicon)
            os: macos-latest
            artifact: yuna-macos-arm
            path: target/release/yuna
          - name: MacOS (Apple Intel)
            os: macos-15-intel
            artifact: yuna-macos-intel
            path: target/release/yuna
    name: "Build ${{ matrix.name }}"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Restore cached dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('**/Cargo.toml') }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Build executable
        run: cargo build --release
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare assets
        run: |
          mkdir -p release
          mv artifacts/yuna-linux/yuna release/yuna-linux
          mv artifacts/yuna-macos-intel/yuna release/yuna-macos-intel
          mv artifacts/yuna-macos-arm/yuna release/yuna-macos-arm
          mv artifacts/yuna-windows/yuna.exe release/yuna-windows.exe
          chmod +x release/yuna-linux release/yuna-macos-intel release/yuna-macos-arm
      - name: Create GitHub Release
        run: |
          gh release create "v${{ inputs.version }}" ${{ github.event.inputs.prerelease == 'true' && '--prerelease' || '' }} release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
