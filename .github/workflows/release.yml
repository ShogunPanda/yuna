name: Publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version number to tag and release"
        required: true
        type: string
      prerelease:
        description: "Release as pre-release"
        required: false
        type: boolean
        default: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact: yuna-linux
            path: target/release/yuna
            cambi: cambi-linux
          - name: Windows
            os: windows-latest
            artifact: yuna-windows
            path: target/release/yuna.exe
          - name: MacOS (Apple Silicon)
            os: macos-latest
            artifact: yuna-macos-arm
            path: target/release/yuna
          - name: MacOS (Apple Intel)
            os: macos-15-intel
            artifact: yuna-macos-intel
            path: target/release/yuna
    name: "Build ${{ matrix.name }}"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Restore cached dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ hashFiles('**/Cargo.toml') }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Build executable
        run: |
          cargo install cambi
          cambi update ${{ inputs.version }}
          cargo build --release
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}

  release:
    name: Release
    environment: main
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Setup cargo OIDC
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Configure git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
      - name: Prepare assets
        run: |
          mkdir -p /tmp/release
          mv artifacts/yuna-linux/yuna /tmp/release/yuna-linux
          mv artifacts/yuna-macos-intel/yuna /tmp/release/yuna-macos-intel
          mv artifacts/yuna-macos-arm/yuna /tmp/release/yuna-macos-arm
          mv artifacts/yuna-windows/yuna.exe /tmp/release/yuna-windows.exe
          chmod +x /tmp/release/yuna-linux /tmp/release/yuna-macos-intel /tmp/release/yuna-macos-arm
      - name: Create release
        run: |
          curl -o /tmp/cambi -sSL https://github.com/ShogunPanda/cambi/releases/latest/download/cambi-linux
          chmod +x /tmp/cambi
          /tmp/cambi changelog ${{ inputs.version }}
          /tmp/cambi update ${{ inputs.version }}
          /tmp/cambi release -n > /tmp/release-notes.txt
      - name: Publish on crates.io
        run: |
          cargo generate-lockfile
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore: Updated version."
          git tag -f "v${{ inputs.version }}"
          cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Publish on GitHub
        run: |
          git push origin && git push origin -f --tags
          gh release create "v${{ inputs.version }}" -t "${{ inputs.version }}" ${{ github.event.inputs.prerelease == 'true' && '--prerelease' || '' }} -F /tmp/release-notes.txt /tmp/release/*
        env:
          GH_TOKEN: ${{ github.token }}
